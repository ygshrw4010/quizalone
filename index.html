<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUIZALONE</title>

<style>
body {
    font-family: sans-serif;
    margin: 20px;
    line-height: 1.8;
}

.file-input-area {
    background: #f0f4f8;
    border: 2px dashed #b0c4de;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 5px;
    text-align: center;
}

button {
    font-size: 20px;
    padding: 14px 22px;
    margin: 10px 0;
    width: 100%;
}

button:disabled {
    background: #e0e0e0;
    color: #a0a0a0;
    cursor: not-allowed;
}

#status {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    padding: 10px;
    background: #fdf5e6;
    border-radius: 5px;
}

#log {
    margin-top: 20px;
    border: 1px solid #ccc;
    padding: 10px;
    height: 220px;
    overflow-y: auto;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<h1>QUIZALONE</h1>

<div class="file-input-area">
    <p style="margin: 0 0 10px 0; font-weight: bold;">1. 最初にお手元のCSVファイルを選択してください：</p>
    <input type="file" id="csvFile" accept=".csv">
</div>

<p>
「次の問題」ボタンで出題します（音声のみ）。<br>
回答時だけ「回答する」を押してください。<br>
問題読み上げ中に「回答する」を押すと、読み上げを止めて回答できます。
</p>

<button id="nextBtn" disabled>次の問題</button>
<button id="answerBtn" disabled>回答する</button>

<div id="status">CSVファイルを読み込んでください</div>
<div id="log">--- ログ ---</div>

<script>
let quizData = []; 
let currentQuestion = null;
let listening = false; 
let timeoutId = null; 

const csvFileInput = document.getElementById("csvFile");
const statusEl = document.getElementById("status");
const logEl = document.getElementById("log");
const nextBtn = document.getElementById("nextBtn");
const answerBtn = document.getElementById("answerBtn");

function log(msg) {
    logEl.textContent += "\n" + msg;
    logEl.scrollTop = logEl.scrollHeight;
}

// --- 1. CSVファイルを読み込んで解析する処理 ---
csvFileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
        const text = event.target.result;
        const lines = text.split(/\r\n|\n/);
        quizData = [];

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue; 

            const parts = line.split(",");
            if (parts.length >= 2) {
                const question = parts[0].replace(/^["']|["']$/g, "").trim();
                const answer = parts[1].replace(/^["']|["']$/g, "").trim();
                
                if (question && answer) {
                    quizData.push({ question: question, answer: answer });
                }
            }
        }

        if (quizData.length > 0) {
            statusEl.textContent = `待機中 (${quizData.length}問のクイズを読み込みました！)`;
            log(`システム: ${quizData.length}問のデータを正常に読み込みました。いつでもスタートできます。`);
            nextBtn.disabled = false;
            answerBtn.disabled = false;
        } else {
            statusEl.textContent = "クイズデータを読み込めませんでした。CSVの形式を確認してください。";
        }
    };
    
    reader.readAsText(file, "UTF-8");
};

// --- 2. 音声合成 (TTS) の設定 ---
const synth = window.speechSynthesis;

function speak(text, callback) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "ja-JP";
    utterance.onend = () => {
        if (callback) callback();
    };
    synth.speak(utterance);
}

function stopSpeaking() {
    if (synth.speaking) {
        synth.cancel();
    }
}

// --- 3. 音声認識 (Speech Recognition) の設定 ---
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = "ja-JP";

// 【超重要】使い切りモードにする（continuousとinterimResultsをfalseに）
recognition.continuous = false; 
recognition.interimResults = false; 

// ※※ バックグラウンドでの自動再起動（onendでのループ）を完全に撤去しました ※※

// --- 4. クイズの制御ロジック ---
function randomQuestion() {
    const idx = Math.floor(Math.random() * quizData.length);
    return quizData[idx];
}

// 文字の正規化
function normalize(str) {
    return str.toLowerCase()
              .replace(/[\u3041-\u3096]/g, m => String.fromCharCode(m.charCodeAt(0) + 0x60)) 
              .replace(/[、。？\?\s\(\)（）「」『』]/g, ""); 
}

function askQuestion() {
    stopSpeaking();
    clearTimeout(timeoutId); 
    
    if (listening) {
        try { recognition.abort(); } catch(e){}
        listening = false;
    }

    currentQuestion = randomQuestion();
    
    log("-------------------------");
    log("システム: 新しい問題を出題しました（音声を聞いてください）");
    statusEl.textContent = "問題読み上げ中...";

    speak(currentQuestion.question, () => {
        statusEl.textContent = "「回答する」ボタンを押して答えてください";
    });
}

nextBtn.onclick = () => {
    if (quizData.length === 0) return;
    askQuestion();
};

// 「回答する」ボタンが押された時の処理
answerBtn.onclick = () => {
    if (!currentQuestion) {
        alert("先に問題を出してください");
        return;
    }

    stopSpeaking(); 
    clearTimeout(timeoutId); 

    if (listening) return; 

    listening = true;
    statusEl.textContent = "音声認識中... (5秒以内に回答してください)";

    // 【重要】ボタンを押した瞬間にだけ、新しくマイクを起動
    try {
        recognition.start();
    } catch (e) {
        console.log("マイク起動エラー:", e);
    }

    // 5秒間、有効な発言（文字）が何も確定されなかった場合のみ時間切れにする
    timeoutId = setTimeout(() => {
        if (listening) {
            listening = false;
            statusEl.textContent = "時間切れ（不正解）";
            log("判定: 時間切れ");
            
            try { recognition.abort(); } catch(e){} // マイクを完全に止める
            
            speak("不正解です。正解は " + currentQuestion.answer + " です", () => {
                setTimeout(askQuestion, 1200); 
            });
        }
    }, 5000);
};

// 音声を聞き取ったときの処理（言葉が完全に確定した時に1回だけ実行されます）
recognition.onresult = (event) => {
    if (!listening) return;

    // 何か聞き取れたので5秒タイマーをストップして受付終了
    clearTimeout(timeoutId);
    listening = false;

    const transcript = event.results[0][0].transcript.trim();
    
    if (!transcript) {
        statusEl.textContent = "聞き取れませんでした（不正解）";
        log("判定: 空の入力");
        speak("不正解です。正解は " + currentQuestion.answer + " です", () => {
            setTimeout(askQuestion, 1200);
        });
        return;
    }

    log("あなた: " + transcript);

    const userAnswer = normalize(transcript);
    const correctAnswer = normalize(currentQuestion.answer);

    // 相互部分一致判定
    const correct =
        userAnswer.includes(correctAnswer) ||
        correctAnswer.includes(userAnswer);

    if (correct) {
        statusEl.textContent = "正解！";
        log("判定: 正解 (" + currentQuestion.answer + ")");
        speak("正解です", () => {
            setTimeout(askQuestion, 1200); 
        });
    } else {
        statusEl.textContent = "不正解";
        log("判定: 不正解");
        speak("不正解です。正解は " + currentQuestion.answer + " です", () => {
            setTimeout(askQuestion, 1200); 
        });
    }
};

// エラーが起きた（無言のままマイクが自動切断されたなど）ときの処理
recognition.onerror = (event) => {
    console.log("音声認識イベント:", event.error);
    // 「no-speech（無言）」エラーが起きても、5秒タイマーが生きている間は勝手に終了させず待つ
};
</script>

</body>
</html>
